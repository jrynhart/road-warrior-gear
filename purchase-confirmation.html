<!DOCTYPE html>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/bulma-navbar.css">
  </head>

  <body>
    <header>
      <section class="hero">
        <picture class="hero-image">
          <source
            srcset="./img/page-banner-mobile.png"
            media="(max-width: 768px)"
          />
          <img
            src="./img/page-banner.png"
            alt="Road warrior gear landscape hero image"
            class="hero-image"
          />
        </picture>
      </section>

      <nav class="navbar site-nav" role="navigation" aria-label="main navigation">
        <div class="navbar-brand">
          <a role="button" class="navbar-burger" aria-label="menu" aria-expanded="false" data-target="navbarBasicExample">
            <span aria-hidden="true"></span>
            <span aria-hidden="true"></span>
            <span aria-hidden="true"></span>
            <span aria-hidden="true"></span>
          </a>
        </div>

        <div id="navbarBasicExample" class="navbar-menu">
          <div class="navbar-start">
            <a class="navbar-item" href="index.html">
              Home
            </a>

            <a class="navbar-item" href="about.html">
              About
            </a>

            <a class="navbar-item" href="contact.html">
              Contact
            </a>
          </div>

          <div class="navbar-end">
            <div class="navbar-item shopping-cart-link">
              <a href="shopping-cart.html" title="View Shopping Cart" >
                <img src="./img/shopping-cart-icon-29081.png" alt="Shopping cart icon">
              </a>
            </div>
          </div>
        </div>
      </nav>
    </header>

    <main>

      <div class="container page purchase-confirmation-page">
          <h1>Purchase Confirmation</h1>

          <div class="purchase-confirmation">
            <span class="thank-you-heading">Thank You!</span>
            <p>We are preparing your order, and we will notify you by email once the order has been shipped.</p>
            <p><span class="confirmation-number">Confirmation Number: 34927659</span></p>
            <p>If you have any questions about your order, please contact our customer support team.</p>
          </div>

      </div>

    </main>

    <footer>
      <div class="container page">
        <p>&copy; 2026 Road Warrior Gear</p>
      </div>
