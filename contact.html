<!DOCTYPE html>
<html lang="en">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>Contact - Road Warrior Gear</title>
    <link href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/bulma-navbar.css">
  </head>

  <body>
    <header>
      <section class="hero">
        <picture class="hero-image">
          <source
            srcset="./img/page-banner-mobile.png"
            media="(max-width: 768px)"
          />
          <img
            src="./img/page-banner.png"
            alt="Road warrior gear landscape hero image"
            class="hero-image"
          />
        </picture>
      </section>

      <nav class="navbar site-nav" aria-label="main navigation">
        <div class="navbar-brand">
          <a role="button" class="navbar-burger" aria-label="menu" aria-expanded="false" data-target="navbarBasicExample">
            <span aria-hidden="true"></span>
            <span aria-hidden="true"></span>
            <span aria-hidden="true"></span>
            <span aria-hidden="true"></span>
          </a>
        </div>

        <div id="navbarBasicExample" class="navbar-menu">
          <div class="navbar-start">
            <a class="navbar-item" href="index.html">
              Home
            </a>

            <a class="navbar-item" href="about.html">
              About
            </a>

            <a class="navbar-item" href="contact.html">
              Contact
            </a>
          </div>

          <div class="navbar-end">
            <div class="navbar-item shopping-cart-link">
              <a href="shopping-cart.html" title="View Shopping Cart" >
                <img src="./img/shopping-cart-icon-29081.png" alt="Shopping cart icon">
              </a>
            </div>
          </div>
        </div>
      </nav>
    </header>

    <main>

      <div class="container page">
        <h1>Contact Us</h1>

        <section id="connect" class="contact-section">
          <h2>Connect</h2>
          
          <h3>Email</h3>
          <p><a href="mailto:connect@roadwarriorgear.com">connect@roadwarriorgear.com</a></p>

          <h3>Phone</h3>
          <p>303-123-4567</p>
        </section>

        <section id="share" class="contact-section">
          <h2>Share</h2>

          <div class="social-media-links">
            <a>
              <img src="./img/fb-logo.png" alt="Facebook"/>
            </a>
            <a>
              <img src="./img/instagram-logo.png" alt="Instagram"/>
            </a>
            <a>
              <img src="./img/twitter-logo.png" alt="Twitter"/>
            </a>
          </div> 
        </section>

        <section id="store-information" class="contact-section">
          <h2>Store Information</h2>

          <h3>Location</h3>
          <div class="location-map">
            <iframe title="Google map showing our company's location" src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d1116.1455345936724!2d-104.98453206049679!3d39.75503596404954!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e1!3m2!1sen!2sus!4v1769390592413!5m2!1sen!2sus" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
          </div>

          <h3>Hours</h3>
          <table class="store-hours">
            <tbody>
              <tr><td>Sunday</td><td>Closed</td></tr>
              <tr><td>Monday</td><td>10am - 6pm</td></tr>
              <tr><td>Tuesday</td><td>10am - 6pm</td></tr>
              <tr><td>Wednesday</td><td>10am - 6pm</td></tr>
              <tr><td>Thursday</td><td>10am - 6pm</td></tr>
              <tr><td>Friday</td><td>10am - 4pm</td></tr>
              <tr><td>Saturday</td><td>11am - 4pm</td></tr>
            </tbody>
          </table>
        </section>

        <!-- <section id="other-information" class="contact-section">
          <h2>Other Information</h2>
        </section> -->
      </div>

      

    </main>

    <footer>
      <div class="container">
        <p>&copy; 2026 Road Warrior Gear</p>
      </div>
    </footer>
  </body>
</html>
