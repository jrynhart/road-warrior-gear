<!DOCTYPE html>
<html lang="en">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>Checkout - Road Warrior Gear</title>
    <link href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css" rel="stylesheet">
    <link href="./css/bulma-calendar.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/bulma-navbar.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300..700&family=IBM+Plex+Mono:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;1,100;1,200;1,300;1,400;1,500;1,600;1,700&family=IBM+Plex+Sans:ital,wght@0,100..700;1,100..700&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">
  </head>

  <style>
    .datetimepicker-clear-button {
      display: none
    }
  </style>

  <body>
    <header>
      <section class="hero">
        <picture class="hero-image">
          <source
            srcset="./img/page-banner-mobile.png"
            media="(max-width: 768px)"
          />
          <img
            src="./img/page-banner.png"
            alt="Road warrior gear landscape hero image"
            class="hero-image"
          />
        </picture>
      </section>

      <nav class="navbar site-nav" aria-label="main navigation">
        <div class="navbar-brand">
          <a role="button" class="navbar-burger" aria-label="menu" aria-expanded="false" data-target="navbarBasicExample">
            <span aria-hidden="true"></span>
            <span aria-hidden="true"></span>
            <span aria-hidden="true"></span>
            <span aria-hidden="true"></span>
          </a>
        </div>

        <div id="navbarBasicExample" class="navbar-menu">
          <div class="navbar-start">
            <a class="navbar-item" href="index.html">
              Home
            </a>

            <a class="navbar-item" href="about.html">
              About
            </a>

            <a class="navbar-item" href="contact.html">
              Contact
            </a>
          </div>

          <div class="navbar-end">
            <div class="navbar-item shopping-cart-link">
              <a href="shopping-cart.html" title="View Shopping Cart" >
                <img src="./img/shopping-cart-icon-29081.png" alt="Shopping cart icon">
              </a>
            </div>
          </div>
        </div>
      </nav>
    </header>

    <main>

      <div class="container page checkout-page">
          <h1>Checkout</h1>

          <div class="grid-layout">

            <div class="checkout-form">
              <section>
                <div class="shipping-info">
                  <h2>Shipping Information</h2>
                    <form>
                      <div class="form-row">
                        <div class="form-group">
                          <label for="first-name">First Name</label>
                          <input type="text" id="first-name" name="first-name" required>
                        </div>
                        

                        <div class="form-group">
                          <label for="last-name">Last Name</label>
                          <input type="text" id="last-name" name="last-name" required>
                        </div>
                      </div>
                      
                      <div class="form-row">
                        <div class="form-group">
                          <label for="address1">Address 1</label>
                          <input type="text" id="address1" name="address1" required>
                        </div>
                      </div>
                      
                      <div class="form-row">
                        <div class="form-group">
                          <label for="address2">Address 2</label>
                          <input type="text" id="address2" name="address2" required>
                        </div>
                      </div>
                      
                      <div class="form-row">
                        <div class="form-group">
                          <label for="city">City</label>
                          <input type="text" id="city" name="city" required>
                        </div>

                        <div class="form-group">
                          <label for="state">State</label>
                          <input type="text" id="state" name="state" required>
                        </div>
                      </div>
                      
                      <div class="form-row">
                        <div class="form-group">
                          <label for="zip">Zip Code</label>
                          <input type="text" id="zip" name="zip" required>
                        </div>

                        <div class="form-group">
                          <label for="country">Country</label>
                          <input type="text" id="country" name="country" required>
                        </div>
                      </div>

                      <div class="form-row">
                        <div class="form-group">
                          <label for="email">Email</label>
                          <input type="email" id="email" name="email" required>
                        </div>
                      </div>
                    </form>
                </div>
              </section>
              
              <section>
                <div class="payment-info">
                  <h2>Payment Information</h2>
                    <form>
                      <div class="form-row">
                        <div class="form-group">
                          <label for="card-number">Card Number</label>
                          <input type="text" id="card-number" name="card-number" required>
                        </div>

                        <div class="form-group">
                          <label for="expiry">Expiration Date</label>
                          <input type="date" id="expiry" name="expiry" class="input bulmaCalendar" required onclick="clearDatepickerValue()" style="flex-flow: column;">
                        </div>

                        <div class="form-group">
                          <label for="cvv">CVV</label>
                          <input type="text" id="cvv" name="cvv" required>
                        </div>
                      </div>
                        
                      <div class="form-row">
                        <div class="form-group">
                          <label for="card-name">Cardholder Name</label>
                          <input type="text" id="card-name" name="card-name" required>
                        </div>

                        <div class="form-group">
                          <label for="billing-zip">Billing Zip Code</label>
                          <input type="text" id="billing-zip" name="billing-zip" required>
                        </div>
                      </div>
                    </form>
                </div>
              </section>
              
            </div>

            <section>
              <h2>Order Summary</h2>
              <div class="order-summary">
                <div>

                  <table>
                    <tr>
                      <td>Subtotal:</td>
                      <td>$49.99</td>
                    </tr>
                    <tr>
                      <td>Shipping:</td>
                      <td>$5.99</td>
                    </tr>
                    <tr>
                      <td>Total:</td>
                      <td>$55.98</td>
                    </tr>
                  </table>

                  <!-- bulma -->
                  <div class="buttons are-medium">
                    <button class="add-coupon" type="button">Click to Add Coupon</button>
                    <button class="place-order" type="submit">Place Order</button>
                  </div>
                </div>
                
              </div>
            </section>
            
            
          </div>

      </div>
      
    </main>

    <footer>
      <div class="container page">
        <p>&copy; 2026 Road Warrior Gear</p>
      </div>
    </footer>

    <!-- bulma calendar -->
    <script src="./js/bulma-calendar.min.js"></script>
    <script>
      ready(function () {
        bulmaCalendar.attach('.bulmaCalendar');
      });
    </script>
    <!-- end bulma calendar -->

    <script>
      function clearDatepickerValue() {
        const datepickerInput = document.getElementById('expiry');
        datepickerInput.value = '';
      }
    </script>
  </body>
</html>
